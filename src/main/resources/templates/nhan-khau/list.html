<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nhân khẩu')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('nhan-khau')}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h4 class="mb-0" th:if="${hoGiaDinh == null}">Nhân khẩu</h4>
                    <h4 class="mb-0" th:unless="${hoGiaDinh == null}">
                        Nhân khẩu — Căn hộ <span th:text="${hoGiaDinh.soCanHo}"></span>
                    </h4>
                </div>
                <a th:href="@{/nhan-khau/them}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Thêm nhân khẩu
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <!-- Tìm kiếm -->
            <form th:action="@{/nhan-khau}" method="get" class="mb-3 d-flex gap-2" style="max-width: 400px;">
                <input type="text" name="search" th:value="${search}" class="form-control form-control-sm"
                       placeholder="Tìm theo họ tên..."/>
                <button type="submit" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-search"></i>
                </button>
                <a th:href="@{/nhan-khau}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover table-bordered mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Họ tên</th>
                            <th>Ngày sinh</th>
                            <th>Giới tính</th>
                            <th>CCCD</th>
                            <th>Căn hộ</th>
                            <th>Quan hệ chủ hộ</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(danhSach)}">
                            <td colspan="8" class="text-center text-muted py-3">Chưa có nhân khẩu nào.</td>
                        </tr>
                        <tr th:each="nk, stat : ${danhSach}">
                            <td th:text="${stat.count}"></td>
                            <td th:text="${nk.hoTen}"></td>
                            <td th:text="${nk.ngaySinh != null} ? ${#temporals.format(nk.ngaySinh, 'dd/MM/yyyy')} : '--'"></td>
                            <td th:text="${nk.gioiTinh}"></td>
                            <td th:text="${nk.cccd} ?: '--'"></td>
                            <td>
                                <a th:href="@{/ho-gia-dinh/{id}(id=${nk.hoGiaDinh.id})}"
                                   th:text="${nk.hoGiaDinh.soCanHo}" class="text-decoration-none"></a>
                            </td>
                            <td th:text="${nk.quanHeChuHo}"></td>
                            <td class="text-center">
                                <a th:href="@{/nhan-khau/sua/{id}(id=${nk.id})}" class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/nhan-khau/xoa/{id}(id=${nk.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Xác nhận xóa nhân khẩu này?')">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
