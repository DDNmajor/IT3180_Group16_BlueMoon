<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ── HEAD ─────────────────────────────────────────────────── -->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' | BlueMoon'">BlueMoon</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); background-color: #212529; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #ffffff; background-color: #343a40; border-radius: 6px; }
        .sidebar .nav-section { color: #6c757d; font-size: 0.75rem; text-transform: uppercase; padding: 0.5rem 1rem; margin-top: 0.5rem; }
    </style>
</head>

<!-- ── NAVBAR ────────────────────────────────────────────────── -->
<nav th:fragment="navbar" class="navbar navbar-dark bg-primary px-3">
    <a class="navbar-brand fw-bold" href="/dashboard">
        <i class="bi bi-moon-stars-fill me-2"></i>BlueMoon
    </a>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white small">
            <i class="bi bi-person-circle me-1"></i>
            <span th:text="${#authentication?.name}">Người dùng</span>
        </span>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Đăng xuất
            </button>
        </form>
    </div>
</nav>

<!-- ── SIDEBAR (Đã thêm biến activePage) ─────────────────────── -->
<div th:fragment="sidebar(activePage)" class="col-md-2 sidebar pt-3"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <nav class="nav flex-column px-2 gap-1">
        <span class="nav-section">Tổng quan</span>
        <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''" th:href="@{/dashboard}">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>

        <span class="nav-section">Sprint 1</span>
        <a class="nav-link" sec:authorize="hasRole('admin')"
           th:classappend="${activePage == 'nguoi-dung'} ? 'active' : ''" th:href="@{/nguoi-dung}">
            <i class="bi bi-people me-2"></i>Người dùng
        </a>
        <a class="nav-link" th:classappend="${activePage == 'loai-khoan-thu'} ? 'active' : ''" th:href="@{/loai-khoan-thu}">
            <i class="bi bi-tags me-2"></i>Loại khoản thu
        </a>
        <a class="nav-link" th:classappend="${activePage == 'khoan-thu'} ? 'active' : ''" th:href="@{/khoan-thu}">
            <i class="bi bi-receipt me-2"></i>Khoản thu
        </a>

        <span class="nav-section">Sprint 2</span>
        <a class="nav-link" th:classappend="${activePage == 'ho-gia-dinh'} ? 'active' : ''" th:href="@{/ho-gia-dinh}">
            <i class="bi bi-house me-2"></i>Hộ gia đình
        </a>
        <a class="nav-link" th:classappend="${activePage == 'nhan-khau'} ? 'active' : ''" th:href="@{/nhan-khau}">
            <i class="bi bi-person me-2"></i>Nhân khẩu
        </a>
        <a class="nav-link" th:classappend="${activePage == 'thanh-toan'} ? 'active' : ''" th:href="@{/thanh-toan}">
            <i class="bi bi-cash-coin me-2"></i>Thanh toán
        </a>
    </nav>
</div>

<!-- ── FLASH MESSAGES ────────────────────────────────────────── -->
<div th:fragment="alerts">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- ── SCRIPTS ───────────────────────────────────────────────── -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>

</html>
