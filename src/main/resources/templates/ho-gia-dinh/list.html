<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Hộ gia đình')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('ho-gia-dinh')}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Hộ gia đình</h4>
                <a th:href="@{/ho-gia-dinh/them}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Thêm hộ
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div th:if="${emptyMsg}" class="alert alert-warning">
                <i class="bi bi-search me-1"></i><span th:text="${emptyMsg}"></span>
            </div>

            <!-- Tìm kiếm -->
            <form th:action="@{/ho-gia-dinh}" method="get" class="mb-3 d-flex gap-2" style="max-width: 400px;">
                <input type="text" name="search" th:value="${search}" class="form-control form-control-sm"
                       placeholder="Tìm theo số căn hộ, tên chủ hộ, CCCD..."/>
                <button type="submit" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-search"></i>
                </button>
                <a th:href="@{/ho-gia-dinh}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover table-bordered mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Số căn hộ</th>
                            <th>Chủ hộ</th>
                            <th>Diện tích (m²)</th>
                            <th>SĐT</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(danhSach)}">
                            <td colspan="6" class="text-center text-muted py-3">Chưa có hộ gia đình nào.</td>
                        </tr>
                        <tr th:each="hgd, stat : ${danhSach}">
                            <td th:text="${stat.count}"></td>
                            <td>
                                <a th:href="@{/ho-gia-dinh/{id}(id=${hgd.id})}" th:text="${hgd.soCanHo}" class="text-decoration-none fw-semibold"></a>
                            </td>
                            <td th:text="${hgd.chuHo}"></td>
                            <td th:text="${hgd.dienTich}"></td>
                            <td th:text="${hgd.soDienThoai}"></td>
                            <td class="text-center">
                                <a th:href="@{/ho-gia-dinh/{id}(id=${hgd.id})}" class="btn btn-info btn-sm text-white">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/ho-gia-dinh/sua/{id}(id=${hgd.id})}" class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/ho-gia-dinh/xoa/{id}(id=${hgd.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Xác nhận xóa hộ gia đình này?')">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
