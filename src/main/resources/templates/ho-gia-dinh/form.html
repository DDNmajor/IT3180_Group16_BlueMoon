<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Hộ gia đình')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('ho-gia-dinh')}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="@{/ho-gia-dinh}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0" th:text="${hoGiaDinh.id == null} ? 'Thêm hộ gia đình' : 'Sửa hộ gia đình'"></h4>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm" style="max-width: 540px;">
                <div class="card-body">
                    <form th:action="${hoGiaDinh.id == null} ? @{/ho-gia-dinh/them} : @{/ho-gia-dinh/sua/{id}(id=${hoGiaDinh.id})}"
                          th:object="${hoGiaDinh}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Số căn hộ <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{soCanHo}" class="form-control"
                                   th:readonly="${hoGiaDinh.id != null}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tên chủ hộ <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{chuHo}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Diện tích (m²)</label>
                            <input type="number" th:field="*{dienTich}" class="form-control" step="0.01" min="0"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" th:field="*{soDienThoai}" class="form-control"/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Ghi chú</label>
                            <textarea th:field="*{ghiChu}" class="form-control" rows="2"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Lưu
                            </button>
                            <a th:href="@{/ho-gia-dinh}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
