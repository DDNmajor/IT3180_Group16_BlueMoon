<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Người dùng')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0" th:text="${nguoiDung.id == null} ? 'Thêm người dùng' : 'Sửa người dùng'"></h4>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm" style="max-width: 540px;">
                <div class="card-body">
                    <form th:action="${nguoiDung.id == null} ? @{/nguoi-dung/them} : @{/nguoi-dung/sua/{id}(id=${nguoiDung.id})}"
                          th:object="${nguoiDung}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{tenDangNhap}" class="form-control"
                                   th:readonly="${nguoiDung.id != null}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" th:field="*{matKhau}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{hoTen}" class="form-control" required/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Vai trò <span class="text-danger">*</span></label>
                            <select th:field="*{vaiTro}" class="form-select" required>
                                <option value="">-- Chọn vai trò --</option>
                                <option th:each="vt : ${danhSachVaiTro}"
                                        th:value="${vt}" th:text="${vt}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Lưu
                            </button>
                            <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
