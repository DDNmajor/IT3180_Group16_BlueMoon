<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý người dùng')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('nguoi-dung')}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Quản lý người dùng</h4>
                <a th:href="@{/nguoi-dung/them}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Thêm người dùng
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover table-bordered mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Tên đăng nhập</th>
                            <th>Họ tên</th>
                            <th>Vai trò</th>
                            <th class="text-center">Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(danhSach)}">
                            <td colspan="7" class="text-center text-muted py-3">Chưa có người dùng nào.</td>
                        </tr>
                        <tr th:each="nd, stat : ${danhSach}">
                            <td th:text="${stat.count}"></td>
                            <td>
                                <span th:text="${nd.tenDangNhap}"></span>
                                <span th:if="${nd.doiMatKhauLanDau}"
                                      class="badge bg-warning text-dark ms-1"
                                      title="Cần đổi mật khẩu lần đầu">
                                    <i class="bi bi-key"></i>
                                </span>
                            </td>
                            <td th:text="${nd.hoTen}"></td>
                            <td>
                                <span th:text="${nd.vaiTro}"
                                      th:classappend="${nd.vaiTro.name() == 'admin'} ? 'badge bg-danger' : 'badge bg-secondary'">
                                </span>
                            </td>
                            <td class="text-center">
                                <span th:if="${nd.active}" class="badge bg-success">Hoạt động</span>
                                <span th:unless="${nd.active}" class="badge bg-secondary">Vô hiệu</span>
                            </td>
                            <td th:text="${nd.ngayTao != null ? #temporals.format(nd.ngayTao, 'dd/MM/yyyy HH:mm') : '—'}"></td>
                            <td class="text-center">
                                <a th:href="@{/nguoi-dung/sua/{id}(id=${nd.id})}" class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/nguoi-dung/xoa/{id}(id=${nd.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Xác nhận xóa người dùng này?')">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
