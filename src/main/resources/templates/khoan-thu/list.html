<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Khoản thu')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Khoản thu</h4>
                <a th:href="@{/khoan-thu/them}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Thêm khoản thu
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover table-bordered mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Tên khoản thu</th>
                            <th>Loại</th>
                            <th class="text-end">Số tiền</th>
                            <th>Đơn vị</th>
                            <th>Kỳ thu</th>
                            <th>Hạn nộp</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(danhSach)}">
                            <td colspan="8" class="text-center text-muted py-3">Chưa có khoản thu nào.</td>
                        </tr>
                        <tr th:each="kt, stat : ${danhSach}">
                            <td th:text="${stat.count}"></td>
                            <td th:text="${kt.tenKhoanThu}"></td>
                            <td th:text="${kt.loaiKhoanThu?.tenLoai}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(kt.soTien, 0, 'COMMA', 0, 'POINT')}"></td>
                            <td th:text="${kt.donVi}"></td>
                            <td th:text="${#temporals.format(kt.kyThu, 'MM/yyyy')}"></td>
                            <td th:text="${kt.hanNop != null ? #temporals.format(kt.hanNop, 'dd/MM/yyyy') : '--'}"></td>                            <td class="text-center">
                                <a th:href="@{/khoan-thu/sua/{id}(id=${kt.id})}" class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/khoan-thu/xoa/{id}(id=${kt.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Xác nhận xóa khoản thu này?')">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
