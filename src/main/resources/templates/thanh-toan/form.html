<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ghi nhận thanh toán')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="@{/thanh-toan}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0">Ghi nhận thanh toán</h4>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm" style="max-width: 560px;">
                <div class="card-body">
                    <form th:action="@{/thanh-toan/them}" th:object="${thanhToan}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Hộ gia đình <span class="text-danger">*</span></label>
                            <select name="hoGiaDinh.id" class="form-select" required>
                                <option value="">-- Chọn căn hộ --</option>
                                <option th:each="hgd : ${danhSachHo}"
                                        th:value="${hgd.id}"
                                        th:text="${hgd.soCanHo} + ' — ' + ${hgd.chuHo}"
                                        th:selected="${thanhToan.hoGiaDinh?.id == hgd.id}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Khoản thu <span class="text-danger">*</span></label>
                            <select name="khoanThu.id" class="form-select" required>
                                <option value="">-- Chọn khoản thu --</option>
                                <option th:each="kt : ${danhSachKhoan}"
                                        th:value="${kt.id}"
                                        th:text="${kt.tenKhoanThu} + ' (' + ${#temporals.format(kt.kyThu, 'MM/yyyy')} + ')'"
                                        th:selected="${thanhToan.khoanThu?.id == kt.id}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số tiền đã nộp <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="number" th:field="*{soTienDaNop}" class="form-control" min="0" step="1000" required/>
                                <span class="input-group-text">đ</span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Ghi chú</label>
                            <input type="text" th:field="*{ghiChu}" class="form-control"/>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-cash-coin me-1"></i>Ghi nhận
                            </button>
                            <a th:href="@{/thanh-toan}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
