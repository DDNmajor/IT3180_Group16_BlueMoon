<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Loại khoản thu')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="@{/loai-khoan-thu}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0" th:text="${loaiKhoanThu.id == null} ? 'Thêm loại khoản thu' : 'Sửa loại khoản thu'"></h4>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm" style="max-width: 540px;">
                <div class="card-body">
                    <form th:action="${loaiKhoanThu.id == null} ? @{/loai-khoan-thu/them} : @{/loai-khoan-thu/sua/{id}(id=${loaiKhoanThu.id})}"
                          th:object="${loaiKhoanThu}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Tên loại <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{tenLoai}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea th:field="*{moTa}" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-4 form-check">
                            <input type="checkbox" th:field="*{batBuoc}" class="form-check-input" id="batBuoc"/>
                            <label class="form-check-label" for="batBuoc">Khoản thu bắt buộc</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Lưu
                            </button>
                            <a th:href="@{/loai-khoan-thu}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
