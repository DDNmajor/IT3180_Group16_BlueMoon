<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Loại khoản thu')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Loại khoản thu</h4>
                <a th:href="@{/loai-khoan-thu/them}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Thêm loại
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover table-bordered mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Tên loại</th>
                            <th>Mô tả</th>
                            <th class="text-center">Bắt buộc</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(danhSach)}">
                            <td colspan="5" class="text-center text-muted py-3">Chưa có loại khoản thu nào.</td>
                        </tr>
                        <tr th:each="lkt, stat : ${danhSach}">
                            <td th:text="${stat.count}"></td>
                            <td th:text="${lkt.tenLoai}"></td>
                            <td th:text="${lkt.moTa}"></td>
                            <td class="text-center">
                                <span th:if="${lkt.batBuoc}" class="badge bg-danger">Bắt buộc</span>
                                <span th:unless="${lkt.batBuoc}" class="badge bg-secondary">Tùy chọn</span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/loai-khoan-thu/sua/{id}(id=${lkt.id})}" class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/loai-khoan-thu/xoa/{id}(id=${lkt.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Xác nhận xóa loại khoản thu này?')">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
