<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>

        <main class="col-md-10 p-4">
            <h4 class="mb-4">Dashboard</h4>

            <!-- Thống kê tổng quan — sẽ bổ sung dữ liệu thật ở Sprint 3 -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card text-white bg-primary">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small">Hộ gia đình</div>
                                <div class="fs-4 fw-bold" th:text="${tongHoGiaDinh}">--</div>
                            </div>
                            <i class="bi bi-house fs-2 opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-success">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small">Nhân khẩu</div>
                                <div class="fs-4 fw-bold" th:text="${tongNhanKhau}">--</div>
                            </div>
                            <i class="bi bi-people fs-2 opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-warning">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small">Khoản thu</div>
                                <div class="fs-4 fw-bold" th:text="${tongKhoanThu}">--</div>
                            </div>
                            <i class="bi bi-receipt fs-2 opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-info">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small">Đã thu (tháng này)</div>
                                <div class="fs-4 fw-bold" th:text="${#numbers.formatDecimal(tongTienThangNay ?: 0, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">--</div>
                            </div>
                            <i class="bi bi-cash-coin fs-2 opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i>
                Dashboard sẽ hiển thị thống kê chi tiết ở Sprint 3.
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
